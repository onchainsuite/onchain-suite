name: CI

on:
  push:
    branches: [dev, main, staging]
  pull_request:
    branches: [dev, main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Types · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run type-check

      # Two suites are quarantined with pre-existing failures (MCP stream
      # mocks and the in-app integration tab). Fix them, then remove the
      # excludes so they gate again. New failures anywhere else still block.
      - name: Tests
        run: >
          bunx vitest run
          --exclude "src/features/intelligence/components/query/index.test.tsx"
          --exclude "src/features/settings/components/integrations/inapp.test.tsx"

  build:
    name: Next build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
